<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download MINI GAME</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f, #111119);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 30px 15px;
        }

        .container {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }

        .app-icon {
            width: 110px;
            height: 110px;
            border-radius: 24px;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .app-name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .app-subtitle {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 25px;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
            text-decoration: none;
            padding: 14px 30px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(0, 114, 255, 0.4);
            width: 100%;
            margin-bottom: 20px;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 114, 255, 0.6);
        }

        .google-play-badge {
            width: 135px;
            opacity: 0.8;
        }

        /* Screenshot Section */
        .screenshot-section {
            width: 100%;
        }

        .section-title {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .screenshot-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .screenshot-frame {
            background: #000;
            border: 4px solid #333;
            border-radius: 18px;
            width: 47%; /* Side by side fit */
            aspect-ratio: 9 / 16;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .screenshot-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Main Download Card -->
        <div class="card">
            <img class="app-icon" src="https://i.ibb.co/Y4j1vBLw/1000049146-removebg-preview.png" alt="MINI GAME Icon">
            <h1 class="app-name">MINI GAME</h1>
            <p class="app-subtitle">Play exciting games inside one app!</p>
            
            <a href="https://play.google.com/store/apps/details?id=com.dhurandhar.game" class="download-btn">
                Download Now
            </a>

            <img class="google-play-badge" src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Get it on Google Play">
        </div>

        <!-- Screenshots Section -->
        <div class="screenshot-section">
            <h2 class="section-title">App Screenshots</h2>
            <div class="screenshot-container">
                <!-- Screenshot 1 -->
                <div class="screenshot-frame">
                    <img src="https://i.ibb.co/kvjv9rx/Screenshot-2026-05-18-08-36-48-88-a1838d6df6a3f2a3460b5a9d4144fc68.jpg" alt="MINI GAME Screen 1">
                </div>
                <!-- Screenshot 2 -->
                <div class="screenshot-frame">
                    <img src="https://i.ibb.co/DPdkxY0X/Screenshot-2026-05-18-08-36-53-47-a1838d6df6a3f2a3460b5a9d4144fc68.jpg" alt="MINI GAME Screen 2">
                </div>
            </div>
        </div>
    </div>

</body>
</html>
